services:
  - type: web
    name: market-signal-desk
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: SIGNAL_SCHEDULER_ENABLED
        value: "0"
      - key: TOSS_LIVE_PRICES
        value: "0"
      - key: TOSS_LIVE_CANDLES
        value: "0"
      - key: TOSS_LIVE_ORDERBOOK
        value: "0"
      - key: TOSS_LIVE_TRADES
        value: "0"
      - key: TOSS_LIVE_PORTFOLIO
        value: "0"
      - key: DART_LIVE_DISCLOSURES
        value: "0"
      - key: NAVER_LIVE_NEWS
        value: "0"
      - key: GDELT_LIVE_NEWS
        value: "0"
      - key: OPENAI_ANALYSIS_ENABLED
        value: "0"
      - key: MARKET_INDEX_LIVE
        value: "1"
      - key: FX_LIVE_RATES
        value: "1"
      - key: ADMIN_TOKEN
        sync: false
      - key: TOSS_CLIENT_ID
        sync: false
      - key: TOSS_CLIENT_SECRET
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
