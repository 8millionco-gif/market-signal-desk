services:
  - type: web
    name: market-signal-desk
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: SIGNAL_SCHEDULER_ENABLED
        value: "0"
      - key: SIGNAL_DISCOVERY_BOT_ENABLED
        value: "1"
      - key: SIGNAL_STORAGE_BACKEND
        value: "auto"
      - key: SIGNAL_DB_AUTO_MIGRATE
        value: "1"
      - key: SIGNAL_DB_MIGRATE_RUN_LIMIT
        value: "200"
      - key: SIGNAL_RAW_EVENT_STORAGE_ENABLED
        value: "1"
      - key: SIGNAL_RAW_EVENT_PAYLOAD_LIMIT
        value: "40"
      - key: SIGNAL_RAW_EVENT_FILE_LIMIT
        value: "500"
      - key: SIGNAL_DISCOVERY_BOT_INTERVAL_SECONDS
        value: "600"
      - key: SIGNAL_DISCOVERY_BOT_MODE
        value: "intraday"
      - key: SIGNAL_CANDIDATE_POOL_ENABLED
        value: "1"
      - key: SIGNAL_CANDIDATE_POOL_RETAIN_LIMIT
        value: "8"
      - key: SIGNAL_CANDIDATE_POOL_RETAIN_MIN_SCORE
        value: "58"
      - key: SIGNAL_CANDIDATE_POOL_TOP_LIMIT
        value: "5"
      - key: SIGNAL_PERFORMANCE_AUTO_UPDATE
        value: "1"
      - key: SIGNAL_PERFORMANCE_MIN_AGE_MINUTES
        value: "60"
      - key: SIGNAL_AUTO_CANDIDATES_ENABLED
        value: "1"
      - key: SIGNAL_AUTO_CANDIDATE_LIMIT
        value: "20"
      - key: SIGNAL_DOMESTIC_CANDIDATE_LIMIT
        value: "10"
      - key: SIGNAL_OVERSEAS_CANDIDATE_LIMIT
        value: "10"
      - key: SIGNAL_DISCOVERY_MAX_SYMBOLS
        value: "40"
      - key: SIGNAL_DISCOVERY_NEWS_DISPLAY
        value: "3"
      - key: TOSS_LIVE_PRICES
        value: "0"
      - key: TOSS_LIVE_CANDLES
        value: "0"
      - key: TOSS_LIVE_ORDERBOOK
        value: "0"
      - key: TOSS_LIVE_TRADES
        value: "0"
      - key: TOSS_LIVE_PORTFOLIO
        value: "0"
      - key: DART_LIVE_DISCLOSURES
        value: "0"
      - key: NAVER_LIVE_NEWS
        value: "0"
      - key: GDELT_LIVE_NEWS
        value: "0"
      - key: OPENAI_ANALYSIS_ENABLED
        value: "0"
      - key: MARKET_INDEX_LIVE
        value: "1"
      - key: FX_LIVE_RATES
        value: "1"
      - key: ADMIN_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TOSS_CLIENT_ID
        sync: false
      - key: TOSS_CLIENT_SECRET
        sync: false
      - key: DART_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
